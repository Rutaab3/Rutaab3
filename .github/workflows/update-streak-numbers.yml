name: Update Streak Numbers in README

on:
  schedule:
    - cron: '0 3 * * *'          # Every day at 3:00 UTC
  workflow_dispatch:             # Allows manual trigger from Actions tab

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Fetch streak data (JSON)
        id: fetch
        run: |
          curl -sf "https://streak-stats.demolab.com/?user=Rutaab3&type=json" > streak.json
          cat streak.json  # Print for debug visibility in logs

          CURRENT=$(jq -r '.currentStreak.length' streak.json)
          LONGEST=$(jq -r '.longestStreak.length' streak.json)
          TOTAL=$(jq -r '.totalContributions' streak.json)

          echo "CURRENT=$CURRENT"
          echo "LONGEST=$LONGEST"
          echo "TOTAL=$TOTAL"

          # Fail fast if any value is null/empty
          if [ "$CURRENT" = "null" ] || [ -z "$CURRENT" ]; then
            echo "ERROR: CURRENT is null or empty"
            exit 1
          fi
          if [ "$LONGEST" = "null" ] || [ -z "$LONGEST" ]; then
            echo "ERROR: LONGEST is null or empty"
            exit 1
          fi
          if [ "$TOTAL" = "null" ] || [ -z "$TOTAL" ]; then
            echo "ERROR: TOTAL is null or empty"
            exit 1
          fi

          echo "CURRENT=$CURRENT" >> $GITHUB_ENV
          echo "LONGEST=$LONGEST" >> $GITHUB_ENV
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: Update README with new numbers
        run: |
          sed -i "s|<p id=\"current-streak-num\" class=\"streak-number-big\">[0-9]\+</p>|<p id=\"current-streak-num\" class=\"streak-number-big\">${{ env.CURRENT }}</p>|" readme.md
          sed -i "s|<p id=\"longest-streak-num\" class=\"streak-number-big\">[0-9]\+</p>|<p id=\"longest-streak-num\" class=\"streak-number-big\">${{ env.LONGEST }}</p>|" readme.md
          sed -i "s|<p id=\"total-contributions-num\" class=\"streak-number-big\">[0-9]\+</p>|<p id=\"total-contributions-num\" class=\"streak-number-big\">${{ env.TOTAL }}</p>|" readme.md

          echo "Updated readme.md:"
          grep -n "streak-number-big" readme.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add readme.md
          if git diff --staged --quiet; then
            echo "No changes to commit — numbers are already up to date."
          else
            git commit -m "chore: update streak numbers automatically [skip ci]"
            git pull --rebase origin main
            git push
          fi